a:is(:hover, :focus-visible) {

  text-decoration-style: dashed;

h3,

.table-responsive {

  overflow-x: auto;

.table :is(th, td) {

  padding: 0;

.card {

  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);

  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {

  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;

    var(--tooltip-available-width, calc(100vw - 10px)),

  border: 1px solid var(--border);
  border-radius: var(--radius-lg);

  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);

  user-select: none;

.viz-stat-value {

.viz-row {

  flex-wrap: wrap;
  align-items: center;
  gap: 10px;

.text-muted {

}

.sr-only {

  height: 1px;

.viz-controls {

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;pulsefit-architecture-map&#x27;);
  if (!root) return;
  const map = root.querySelector(&#x27;.architecture-map&#x27;);
  const svg = root.querySelector(&#x27;.architecture-links&#x27;);
  const nodes = new Map([...root.querySelectorAll(&#x27;.architecture-node&#x27;)].map((node) =&gt; [node.dataset.id, node]));
  const edges = [
    [&#x27;web&#x27;,&#x27;routing&#x27;], [&#x27;mobile&#x27;,&#x27;routing&#x27;], [&#x27;roles&#x27;,&#x27;routing&#x27;], [&#x27;vercel&#x27;,&#x27;web&#x27;],
    [&#x27;routing&#x27;,&#x27;features&#x27;], [&#x27;features&#x27;,&#x27;state&#x27;], [&#x27;features&#x27;,&#x27;api&#x27;], [&#x27;state&#x27;,&#x27;api&#x27;], [&#x27;api&#x27;,&#x27;auth&#x27;],
    [&#x27;api&#x27;,&#x27;rest&#x27;], [&#x27;api&#x27;,&#x27;realtime&#x27;], [&#x27;api&#x27;,&#x27;r2fn&#x27;], [&#x27;media&#x27;,&#x27;r2fn&#x27;], [&#x27;features&#x27;,&#x27;media&#x27;],
    [&#x27;auth&#x27;,&#x27;postgres&#x27;], [&#x27;rest&#x27;,&#x27;postgres&#x27;], [&#x27;realtime&#x27;,&#x27;messaging&#x27;], [&#x27;realtime&#x27;,&#x27;progress&#x27;],
    [&#x27;r2fn&#x27;,&#x27;registry&#x27;], [&#x27;r2fn&#x27;,&#x27;r2&#x27;], [&#x27;scanfn&#x27;,&#x27;registry&#x27;], [&#x27;scanfn&#x27;,&#x27;r2&#x27;], [&#x27;scanfn&#x27;,&#x27;scanner&#x27;],
    [&#x27;cleanupfn&#x27;,&#x27;registry&#x27;], [&#x27;cleanupfn&#x27;,&#x27;r2&#x27;], [&#x27;postgres&#x27;,&#x27;coaching&#x27;], [&#x27;postgres&#x27;,&#x27;progress&#x27;],
    [&#x27;postgres&#x27;,&#x27;messaging&#x27;], [&#x27;postgres&#x27;,&#x27;registry&#x27;], [&#x27;coaching&#x27;,&#x27;progress&#x27;], [&#x27;messaging&#x27;,&#x27;registry&#x27;],
    [&#x27;progress&#x27;,&#x27;registry&#x27;]
  ];
  const paths = [];

  function point(node, side) {
    const nodeBox = node.getBoundingClientRect();
    const mapBox = map.getBoundingClientRect();
    return {
      x: side === &#x27;left&#x27; ? nodeBox.left - mapBox.left : side === &#x27;right&#x27; ? nodeBox.right - mapBox.left : nodeBox.left + nodeBox.width / 2 - mapBox.left,
      y: nodeBox.top + nodeBox.height / 2 - mapBox.top,
    };
  }

  function draw() {
    const box = map.getBoundingClientRect();
    svg.setAttribute(&#x27;viewBox&#x27;, `0 0 ${Math.max(1, box.width)} ${Math.max(1, box.height)}`);
    edges.forEach(([fromId, toId], index) =&gt; {
      const from = nodes.get(fromId);
      const to = nodes.get(toId);
      if (!from || !to) return;
      const fromBox = from.getBoundingClientRect();
      const toBox = to.getBoundingClientRect();
      const horizontal = Math.abs(fromBox.left - toBox.left) &gt; Math.abs(fromBox.top - toBox.top);
      const start = point(from, horizontal &amp;&amp; fromBox.left &lt; toBox.left ? &#x27;right&#x27; : horizontal ? &#x27;left&#x27; : &#x27;center&#x27;);
      const end = point(to, horizontal &amp;&amp; fromBox.left &lt; toBox.left ? &#x27;left&#x27; : horizontal ? &#x27;right&#x27; : &#x27;center&#x27;);
      const bend = horizontal ? Math.max(24, Math.abs(end.x - start.x) * .45) : 0;
      const d = horizontal
        ? `M ${start.x} ${start.y} C ${start.x + (end.x &gt; start.x ? bend : -bend)} ${start.y}, ${end.x - (end.x &gt; start.x ? bend : -bend)} ${end.y}, ${end.x} ${end.y}`
        : `M ${start.x} ${start.y} C ${start.x} ${(start.y + end.y) / 2}, ${end.x} ${(start.y + end.y) / 2}, ${end.x} ${end.y}`;
      let path = paths[index];
      if (!path) {
        path = document.createElementNS(&#x27;http://www.w3.org/2000/svg&#x27;, &#x27;path&#x27;);
        path.setAttribute(&#x27;class&#x27;, &#x27;architecture-link&#x27;);
        path.dataset.from = fromId;
        path.dataset.to = toId;
        svg.appendChild(path);
        paths[index] = path;
      }
      path.setAttribute(&#x27;d&#x27;, d);
    });
  }

  function select(node) {
    nodes.forEach((candidate) =&gt; candidate.setAttribute(&#x27;aria-pressed&#x27;, String(candidate === node)));
    root.querySelector(&#x27;[data-selection-title]&#x27;).textContent = node.dataset.title;
    root.querySelector(&#x27;[data-selection-description]&#x27;).textContent = node.dataset.description;
    root.querySelector(&#x27;[data-selection-path]&#x27;).textContent = node.dataset.path;
    paths.forEach((path) =&gt; {
      const related = path.dataset.from === node.dataset.id || path.dataset.to === node.dataset.id;
      path.classList.toggle(&#x27;is-related&#x27;, related);
      path.classList.toggle(&#x27;is-muted&#x27;, !related);
    });
  }

  nodes.forEach((node) =&gt; node.addEventListener(&#x27;click&#x27;, () =&gt; select(node)));
  const resizeObserver = new ResizeObserver(draw);
  resizeObserver.observe(map);
  requestAnimationFrame(() =&gt; { draw(); select(nodes.get(&#x27;web&#x27;)); });
})();
&lt;/script&gt;
