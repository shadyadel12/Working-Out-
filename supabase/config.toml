# Supabase local config. Project ref is set when you run `npx supabase link`.
project_id = "workout-program"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://working-out-rho.vercel.app"
additional_redirect_urls = ["http://localhost:5173", "https://working-out-rho.vercel.app"]
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# Local/staging Auth abuse controls. Mirror these values in the hosted
# Supabase dashboard; hosted projects do not read this repository file.
[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 3
token_verifications = 3

[storage]
enabled = true
file_size_limit = "50MiB"
