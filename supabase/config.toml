# Supabase local config. Project ref is set when you run `npx supabase link`.
project_id = "workout-program"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Local/staging Auth abuse controls. Mirror these values in the hosted
# Supabase dashboard; hosted projects do not read this repository file.
[auth.rate_limit]
email_sent = 2
sms_sent = 2
anonymous_users = 5
token_refresh = 30
sign_in_sign_ups = 5
token_verifications = 10

[storage]
enabled = true
file_size_limit = "50MiB"
