<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Web screens · PulseFit architecture</title><style>:root{color-scheme:light dark;--bg:light-dark(#f8fafc,#111827);--fg:light-dark(#172033,#f8fafc);--muted:light-dark(#64748b,#9ca3af);--surface:light-dark(#fff,#1f2937);--line:light-dark(#cbd5e1,#475569);--active:light-dark(#2563eb,#60a5fa)}*{box-sizing:border-box}body{margin:0;padding:clamp(14px,3vw,32px);background:var(--bg);color:var(--fg);font:14px/1.45 system-ui,sans-serif}main{max-width:1200px;margin:auto}.crumbs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.crumbs a{color:var(--fg);text-decoration:none;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}.crumbs span,header p{color:var(--muted)}header{margin:22px 0}h1{font-size:clamp(26px,4vw,42px);margin:0 0 6px}.map{position:relative;min-height:340px}.links{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}.link{fill:none;stroke:var(--line);stroke-width:1.4}.grid{position:relative;z-index:2;display:grid;grid-template-columns:minmax(160px,.3fr) minmax(0,1fr);gap:32px;align-items:center}.children{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.node{display:flex;align-items:center;justify-content:center;min-height:48px;padding:10px;border-radius:12px;background:var(--surface);border:1px solid var(--line);color:var(--fg);text-align:center;text-decoration:none}.root{background:color-mix(in srgb,var(--active) 15%,var(--surface))}@media(max-width:600px){.grid{grid-template-columns:1fr}.map{min-height:620px}}</style></head><body><main><nav class="crumbs"><a href="../index.html">Atlas</a><span>›</span><span>Web</span></nav><header><h1>Web screens</h1><p>Choose a screen group.</p></header><div class="map"><svg class="links"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs></svg><div class="grid"><div class="node root" data-id="root">Web screens</div><div class="children"><a class="node" data-id="n0" href="public/index.html">Public</a><a class="node" data-id="n1" href="auth/index.html">Auth</a><a class="node" data-id="n2" href="coach/index.html">Coach</a><a class="node" data-id="n3" href="player/index.html">Player</a><a class="node" data-id="n4" href="admin/index.html">Admin</a></div></div></div></main><script>const map=document.querySelector('.map'),svg=document.querySelector('.links'),nodes=new Map([...document.querySelectorAll('[data-id]')].map(n=>[n.dataset.id,n]));const edges=[["root","n0"],["root","n1"],["root","n2"],["root","n3"],["root","n4"]];function p(n,s){const a=n.getBoundingClientRect(),b=map.getBoundingClientRect();return{x:(s==='left'?a.left:a.right)-b.left,y:a.top+a.height/2-b.top}}function draw(){svg.querySelectorAll('.link').forEach(x=>x.remove());const b=map.getBoundingClientRect();svg.setAttribute('viewBox','0 0 '+b.width+' '+b.height);edges.forEach(([a,b])=>{const s=p(nodes.get(a),'right'),e=p(nodes.get(b),'left'),d=Math.max(24,(e.x-s.x)*.4),x=document.createElementNS('http://www.w3.org/2000/svg','path');x.setAttribute('class','link');x.setAttribute('marker-end','url(#arrow)');x.setAttribute('d','M '+s.x+' '+s.y+' C '+(s.x+d)+' '+s.y+', '+(e.x-d)+' '+e.y+', '+e.x+' '+e.y);svg.appendChild(x)})}new ResizeObserver(draw).observe(map);requestAnimationFrame(draw)</script></body></html>
